name: Publish to npm

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
jobs:
  publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun run typecheck

      - run: bun test tests/unit

      - run: bun run build

      - name: Bundle shared configs into package
        run: cp ../configs/*.json dist/data/

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_API_TOKEN }}

  post-publish-test:
    name: Post-Publish Smoke Test
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: node/tests/post-publish

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Wait for npm registry propagation
        run: sleep 15

      - name: Install published package and run smoke test
        run: |
          mkdir /tmp/smoke-test && cd /tmp/smoke-test
          bun init -y
          node -e "const p=require('./package.json'); p.type='module'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2))"
          bun install ai-cost-calculator@latest
          cp $GITHUB_WORKSPACE/node/tests/post-publish/smoke.mjs .
          bun smoke.mjs
