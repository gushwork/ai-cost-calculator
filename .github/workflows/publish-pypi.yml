name: Publish to PyPI

on:
  workflow_call:
  workflow_dispatch:
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - run: uv sync --group dev

      - run: uv run pytest tests/ --ignore=tests/test_e2e_live.py -v

      - name: Bundle shared configs into package
        run: cp ../configs/*.json src/ai_cost_calculator/data/

      - run: uv build

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          uv publish
